    <script>
      (function () {
        var isResizeObserverNoise = function (message) {
          return typeof message === "string" && message.indexOf("ResizeObserver loop") !== -1;
        };
        var nativeAddEventListener = window.addEventListener.bind(window);
        window.addEventListener = function (type, listener, options) {
          if (type === "error" && typeof listener === "function") {
            var wrapped = function (event) {
              if (event && isResizeObserverNoise(event.message)) {
                return undefined;
              }
              return listener.apply(this, arguments);
            };
            return nativeAddEventListener(type, wrapped, options);
          }
          return nativeAddEventListener(type, listener, options);
        };
      })();
    </script>
